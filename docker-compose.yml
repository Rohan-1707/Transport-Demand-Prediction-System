version: "3.9"

services:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transport_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./transport_demand.db
      - APP_ENV=production
    volumes:
      - ./backend:/app               # live-reload in dev
      - ./data:/app/data             # share dataset
      - backend_models:/app/models   # persist trained models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transport_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_models:
